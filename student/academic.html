<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Academic Calendar</title>

  <link rel="manifest" href="../manifest.json">

  <link rel="stylesheet" href="../assets/css/common.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

  <script>
    window.history.pushState({ noBackExitsApp: true }, '');
    window.addEventListener('popstate', function(event) {
        window.location.replace('dashboard.html'); 
    });
  </script>
</head>
<body>

<div class="academic-page">
  <div class="erp-topbar">
    <a href="dashboard.html" class="erp-back">
      <i class="bi bi-arrow-left"></i>
    </a>
    <div class="erp-title">ACADEMICS</div>
  </div>

  <div class="academic-content">
    <div class="timeline">

      <div class="event">
        <div class="event-dot"><i class="bi bi-check"></i></div>
        <div class="event-card">
          <div class="event-date">09-08-2025</div>
          <div class="event-title">Raksha Bandhan</div>
        </div>
      </div>

      <div class="event">
        <div class="event-dot"><i class="bi bi-check"></i></div>
        <div class="event-card">
          <div class="event-date">15-08-2025</div>
          <div class="event-title">Independence Day / Parsi New Year</div>
        </div>
      </div>

      <div class="event">
        <div class="event-dot"><i class="bi bi-check"></i></div>
        <div class="event-card">
          <div class="event-date">16-08-2025</div>
          <div class="event-title">Janmashtami</div>
        </div>
      </div>

      <div class="event">
        <div class="event-dot"><i class="bi bi-check"></i></div>
        <div class="event-card">
          <div class="event-date">02-10-2025</div>
          <div class="event-title">Gandhi Jayanti / Dussehra</div>
        </div>
      </div>

      <div class="event">
        <div class="event-dot"><i class="bi bi-check"></i></div>
        <div class="event-card">
          <div class="event-date">20-10-2025 → 02-11-2025</div>
          <div class="event-title">Diwali & Vacation</div>
        </div>
      </div>

      <div class="event">
        <div class="event-dot"><i class="bi bi-check"></i></div>
        <div class="event-card">
          <div class="event-date">25-12-2025</div>
          <div class="event-title">Christmas</div>
        </div>
      </div>

      <div class="event">
        <div class="event-dot"><i class="bi bi-check"></i></div>
        <div class="event-card">
          <div class="event-date">14-01-2026 → 15-01-2026</div>
          <div class="event-title">Makara Sankranti</div>
        </div>
      </div>

      <div class="event">
        <div class="event-dot"><i class="bi bi-check"></i></div>
        <div class="event-card">
          <div class="event-date">26-01-2026</div>
          <div class="event-title">REPUBLIC DAY</div>
        </div>
      </div>

      <div class="event">
        <div class="event-dot"><i class="bi bi-check"></i></div>
        <div class="event-card">
          <div class="event-date">04-03-2026</div>
          <div class="event-title">HOLI</div>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      // Step out of the student/ folder to find sw.js in the root
      navigator.serviceWorker.register('../sw.js', { scope: '../' })
        .then((reg) => {
          console.log('PWA linked successfully from Academic page:', reg.scope);
        })
        .catch((err) => {
          console.error('PWA link failed from Academic page:', err);
        });
    });
  }
</script>

</body>
</html>
