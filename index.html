<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome | Elite Portal</title>

  <!-- ✅ PWA META -->
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#6366f1">
  <link rel="icon" href="./icon-192x192.png">
  <link rel="apple-touch-icon" href="./icon-192x192.png">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #6366f1;
      --glass: rgba(255, 255, 255, 0.1);
      --glass-border: rgba(255, 255, 255, 0.2);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      background: #0f172a;
      background-image: url("./assets/images/college_photo.jpg");
      background-size: cover;
      background-position: center;
      color: #fff;
      overflow: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at center, rgba(15, 23, 42, 0.4) 0%, rgba(15, 23, 42, 0.9) 100%);
      backdrop-filter: blur(4px);
      z-index: 0;
    }

    .content-wrapper {
      position: relative;
      z-index: 1;
    }

    .brand-container {
      margin-bottom: 40px;
    }

    .logo {
      font-size: 32px;
      font-weight: 800;
      margin-bottom: 4px;
      background: linear-gradient(to bottom, #ffffff, #94a3b8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: revealDown 1s forwards;
    }

    .tagline {
      font-size: 14px;
      letter-spacing: 4px;
      color: var(--primary);
      opacity: 0;
      animation: revealUp 1s 0.3s forwards;
    }

    .loader-container {
      width: 220px;
      height: 5px;
      background: var(--glass);
      border-radius: 10px;
      overflow: hidden;
      margin: 25px auto;
      border: 1px solid var(--glass-border);
    }

    .progress-bar {
      width: 0%;
      height: 100%;
      background: var(--primary);
      box-shadow: 0 0 20px var(--primary);
      animation: progressLoad 30s linear forwards; /* 🔥 30 sec */
    }

    .loading-text {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1px;
      opacity: 0.7;
      transition: 0.3s;
    }

    @keyframes revealDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes revealUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes progressLoad {
      from { width: 0%; }
      to { width: 100%; }
    }

    .fade-out {
      opacity: 0;
      transition: opacity 0.7s ease;
    }
  </style>
</head>

<body>

  <div class="content-wrapper">
    <div class="brand-container">
      <div class="logo">PARUL UNIVERSITY</div>
      <div class="tagline">PIET Portal</div>
    </div>

    <div class="loader-container">
      <div class="progress-bar"></div>
    </div>

    <div class="loading-text">Initializing Secure Session...</div>
  </div>

  <script>
    // ✅ SERVICE WORKER
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js')
        .then(() => console.log('✅ SW Registered'))
        .catch(err => console.log('❌ SW Error:', err));
    }

    // ✅ TEXT FLOW (SYNCED WITH 30s)
    const messages = [
      "Initializing Secure Session...",
      "Verifying Credentials...",
      "Fetching Student Data...",
      "Loading Dashboard Modules...",
      "Applying Security Policies...",
      "Optimizing Performance...",
      "Checking Network Integrity...",
      "Encrypting Session...",
      "Finalizing Setup..."
    ];

    let i = 0;
    const textEl = document.querySelector(".loading-text");

    const interval = setInterval(() => {
      i++;
      if (i < messages.length) {
        textEl.textContent = messages[i];
      } else {
        clearInterval(interval);
      }
    }, 3000); // 🔥 spreads across 30 sec

    // ✅ REDIRECT AFTER 30s
    window.onload = function() {
      setTimeout(function() {
        document.body.classList.add('fade-out');

        setTimeout(function() {
          window.location.replace("./student/dashboard.html");
        }, 700);

      }, 30000); // 🔥 30 seconds
    };
  </script>

</body>
</html>
