<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

  <title>Student Dashboard | Elite Portal</title>

  <link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="icon-192x192.png">
<link rel="apple-touch-icon" href="icon-192x192.png">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="apple-touch-icon" href="icon-192x192.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    :root {
      --primary: #6366f1;
      --primary-glow: rgba(99, 102, 241, 0.3);
      --glass: rgba(255, 255, 255, 0.75);
      --glass-border: rgba(255, 255, 255, 0.5);
      --text-main: #0f172a;
      --text-muted: #64748b;
      --bg-mesh: radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0, transparent 50%), 
                 radial-gradient(at 100% 100%, rgba(244, 63, 94, 0.1) 0, transparent 50%);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: #f8fafc;
      background-image: var(--bg-mesh);
      color: var(--text-main);
      min-height: 100vh;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    .dashboard-header {
      background: linear-gradient(135deg, var(--primary) 0%, #4f46e5 100%);
      padding: 30px 5% 60px;
      border-bottom-left-radius: 40px;
      border-bottom-right-radius: 40px;
      box-shadow: 0 20px 40px rgba(99, 102, 241, 0.2);
      position: relative;
      overflow: hidden;
    }

    .dashboard-header::after {
      content: '';
      position: absolute;
      inset: 0;
      background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4z' fill='%23fff' fill-opacity='0.05'/%3E%3C/svg%3E");
      pointer-events: none;
    }

    .top-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: relative;
      z-index: 2;
      margin-bottom: 30px;
    }

    .brand { font-weight: 800; font-size: 1.4rem; color: white; }

    .logout-btn {
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 14px;
      padding: 10px 18px;
      color: white;
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 700;
      transition: 0.3s ease;
    }

    .logout-btn:hover { background: white; color: var(--primary); transform: translateY(-2px); }

    .hero-profile { text-align: center; position: relative; z-index: 2; }

    .profile-img-container { position: relative; width: 110px; height: 110px; margin: 0 auto 15px; }

    .dash-profile-pic {
      width: 100%; height: 100%; border-radius: 35px; border: 4px solid white;
      object-fit: cover; box-shadow: 0 15px 35px rgba(0,0,0,0.2);
    }

    .status-dot {
      position: absolute; bottom: -2px; right: -2px; background: #10b981;
      border: 3px solid white; width: 22px; height: 22px; border-radius: 50%;
    }

    .name-heading { font-size: 1.5rem; font-weight: 800; color: white; margin-bottom: 5px; }

    .result-note {
      margin: -25px 5% 25px; background: var(--glass); backdrop-filter: blur(20px);
      border-radius: 20px; padding: 15px 20px; display: flex; align-items: center; gap: 15px;
    }

    .main-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; padding: 0 5% 40px; }

    .elite-card {
      background: var(--glass); border-radius: 28px; padding: 24px 15px;
      text-decoration: none; color: var(--text-main); display: flex;
      flex-direction: column; align-items: center; gap: 15px; transition: 0.3s;
    }

    .elite-card:hover { transform: translateY(-6px); }

    .icon-box {
      width: 55px; height: 55px; border-radius: 18px;
      display: flex; align-items: center; justify-content: center; font-size: 1.6rem;
    }

    .c1 { background: rgba(99,102,241,0.1); color:#6366f1; }
    .c2 { background: rgba(139,92,246,0.1); color:#8b5cf6; }
    .c3 { background: rgba(236,72,153,0.1); color:#ec4899; }
    .c4 { background: rgba(16,185,129,0.1); color:#10b981; }
    .c5 { background: rgba(245,158,11,0.1); color:#f59e0b; }
    .c6 { background: rgba(59,130,246,0.1); color:#3b82f6; }
    .c7 { background: rgba(239,68,68,0.1); color:#ef4444; }
    .c8 { background: rgba(6,182,212,0.1); color:#06b6d4; }

    .version-footer { text-align: center; padding: 40px 20px; font-size: 0.7rem; color: var(--text-muted); font-weight: 700; opacity: 0.6; }
  </style>
</head>
<body>

<header class="dashboard-header">
  <nav class="top-nav">
    <div class="brand">PU ERP</div>
    <a href="signout.html" class="logout-btn">Sign Out</a>
  </nav>

  <div class="hero-profile">
    <div class="profile-img-container">
      <img src="assets/images/profile.jpg" class="dash-profile-pic" alt="Profile">
      <div class="status-dot"></div>
    </div>
    <h1 class="name-heading">Sri Krishna Vardan</h1>
    <p style="color: rgba(255,255,255,0.7); font-size: 0.8rem;">Reg. #2403031260215</p>
  </div>
</header>

<section class="result-note">
  <i class="bi bi-patch-check-fill"></i>
  <span><strong>Important:</strong> Last subject of Sem-4 examination preponed to 30/04. Check updated admit card.</span>
</section>

<main class="main-grid">
  <a href="student/profile.html" class="elite-card"><div class="icon-box c1"><i class="bi bi-person"></i></div><span>Profile</span></a>
  <a href="student/academic.html" class="elite-card"><div class="icon-box c2"><i class="bi bi-calendar"></i></div><span>Calendar</span></a>
  <a href="student/timetable.html" class="elite-card"><div class="icon-box c3"><i class="bi bi-grid"></i></div><span>Time Table</span></a>
  <a href="student/attendance.html" class="elite-card"><div class="icon-box c4"><i class="bi bi-fingerprint"></i></div><span>Attendance</span></a>
  <a href="student/results.html" class="elite-card"><div class="icon-box c5"><i class="bi bi-award"></i></div><span>Results</span></a>
  <a href="student/fees.html" class="elite-card"><div class="icon-box c6"><i class="bi bi-wallet2"></i></div><span>Fees</span></a>
  <a href="student/hostel.html" class="elite-card"><div class="icon-box c7"><i class="bi bi-building"></i></div><span>Hostel</span></a>
  <a href="student/exam.html" class="elite-card"><div class="icon-box c8"><i class="bi bi-person"></i></div><span>Admitcard</span></a>
</main>

<footer class="version-footer">GNUMS PORTAL • VERSION 2.1.0</footer>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      // Registering sw.js using a relative path for GitHub Pages subfolder compatibility
      navigator.serviceWorker.register('./sw.js')
        .then((reg) => console.log('PWA SW Registered:', reg.scope))
        .catch((err) => console.log('PWA SW Failure:', err));
    });
  }
</script>

</body>
</html>
